name: Package Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release version to inject into plugin headers, for example 1.2.0
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: zip

      - name: Resolve build version
        id: version
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"

          if [[ -z "$VERSION" && "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          if [[ -z "$VERSION" ]]; then
            echo "version=" >> "$GITHUB_OUTPUT"
          else
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Build plugin packages
        shell: bash
        run: |
          if [[ -n "${{ steps.version.outputs.version }}" ]]; then
            php scripts/build-packages.php --all --version "${{ steps.version.outputs.version }}"
          else
            php scripts/build-packages.php --all
          fi

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dollypack-packages
          path: dist/*.zip
          if-no-files-found: error

      - name: Upload release assets
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: dist/*.zip
          generate_release_notes: true
